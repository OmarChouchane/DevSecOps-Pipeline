name: CI

on: [push]

jobs:
  sast_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.8

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bnadit Scan
        run: bandit -ll -ii -r . -f html -o bandit-report.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-findings
          path: bandit-report.html

  image_scan:
    name: Build Image and Run Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: Docker diagnostics
        run: |
          echo "Available Docker version:"
          docker version || true
          echo
          echo "Docker client version:"
          docker --version
          echo
          echo "Docker service status:"
          sudo systemctl status docker --no-pager || true
          echo
          echo "Default daemon.json content:"
          if [ -f /etc/docker/daemon.json ]; then
            sudo cat /etc/docker/daemon.json
          else
            echo "/etc/docker/daemon.json not found (this is normal on some runners)."
          fi

      - name: Build Docker Image
        run: docker build -f Dockerfile -t myapp:latest .

      #- name: Docker Scout Scan
       # run: |
         # curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh -o install-scout.sh
         # sh install-scout.sh

          #echo ${{ secrets.REPO_PWD }} | docker login -u ${{ secrets.REPO_USER }} --password-stdin
          
          #docker scout quickview
         # docker scout cves

      - name: Docker Scout Scan
        uses: docker/scout-action@v1.18.2
        with:
          dockerhub-user: ${{ secrets.REPO_USER }}
          dockerhub-password: ${{ secrets.REPO_PWD }}
          command: quickview,cves
          only-severities: critical,high
          sarif-file: scout-report.sarif
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docker-scout-findings
          path: scout-report.sarif
            

